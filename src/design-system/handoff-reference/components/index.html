<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lenar CV — UI kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    /* ============================================================== Page shell */
    html, body { margin: 0; padding: 0; background: #0a0a0a; color: var(--fg-primary); font-family: var(--font-sans); overflow-x: hidden; }
    *, *::before, *::after { box-sizing: border-box; }

    /* Hide scrollbars (Firefox / IE) but keep scrolling */
    html { scrollbar-width: none; -ms-overflow-style: none; }
    /* Chromium / Safari */
    html::-webkit-scrollbar, body::-webkit-scrollbar, *::-webkit-scrollbar { width: 0; height: 0; display: none; }

    .cv-stage { position: relative; min-height: 100vh; width: 100%; overflow-x: hidden; }

    /* Noise canvas — background-color is what the field paints "behind" (clear color),
       color is what the BLOBS paint in. Toggling .lava-mode swaps both. */
    .noise-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block;
      color: rgba(255, 255, 255, 1);            /* blob color — white by default */
      background-color: rgba(10, 10, 10, 1);    /* clear color */
      opacity: 0; transition: opacity 700ms ease;
      pointer-events: none;
    }
    .noise-canvas.is-ready { opacity: 1; }

    /* Lava mode — hide the system cursor everywhere except on the lava toggle */
    body.lava-mode { cursor: none; }
    body.lava-mode .cv-lava { cursor: pointer; }

    /* Floating chrome — top-right cluster: PDF icon-button + EN/RU pill */
    .cv-chrome {
      position: fixed; top: 24px; right: 24px; z-index: 5;
      display: flex; gap: 8px; align-items: flex-end; flex-direction: column;
      transition: opacity 360ms ease, transform 360ms ease, filter 360ms ease;
    }
    .cv-chrome__row {
      display: flex; gap: 8px; align-items: center;
    }
    .cv-lang {
      display: inline-flex; padding: 4px; border-radius: 999px;
      background: rgba(20, 20, 20, 0.78); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .cv-lang__btn {
      appearance: none; border: 0; background: transparent;
      color: var(--fg-primary); font: inherit; font-weight: 500;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      letter-spacing: 0.04em; font-size: 13px;
      transition: background 160ms ease, color 160ms ease;
    }
    .cv-lang__btn.is-active { background: var(--fg-primary); color: #000; }
    .cv-lang__btn:not(.is-active):hover { background: rgba(255,255,255,0.08); }

    /* Profile switcher — vertical column under the language switcher */
    .cv-profile {
      display: inline-flex; flex-direction: column; padding: 4px;
      border-radius: 18px; gap: 2px;
      background: rgba(20, 20, 20, 0.78); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .cv-profile__btn {
      appearance: none; border: 0; background: transparent;
      color: var(--fg-primary); font: inherit; font-weight: 500;
      font-size: 13px; padding: 7px 14px; border-radius: 14px;
      cursor: pointer; transition: background 160ms ease, color 160ms ease;
      text-align: right;
    }
    .cv-profile__btn.is-active { background: var(--fg-primary); color: #000; cursor: default; }
    .cv-profile__btn:not(.is-active):hover { background: rgba(255,255,255,0.08); }

    /* Profile switcher inside the hero — placed in the top-right corner
       of the header body, aligned with the name. */
    .cv-header__top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px;
    }
    .cv-header__heading { flex: 1 1 auto; min-width: 0; }
    .cv-header__profile { flex: 0 0 auto; align-self: flex-start; padding-top: 4px; }
    .cv-header__profile .cv-profile {
      flex-direction: row; gap: 4px; padding: 4px;
      border-radius: 999px; background: rgba(255,255,255,0.04);
      backdrop-filter: none; border: 1px solid rgba(255,255,255,0.08);
    }
    .cv-header__profile .cv-profile__btn {
      padding: 6px 14px; border-radius: 999px; text-align: center;
      font-size: 12.5px; letter-spacing: 0.02em;
    }

    .cv-lava {
      position: fixed; top: 18px; left: 18px; z-index: 5;
      width: 52px; height: 52px; border-radius: 999px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; backdrop-filter: blur(8px);
      display: grid; place-items: center; padding: 6px;
      transition: background 160ms ease, transform 160ms ease;
    }
    .cv-lava:hover { background: rgba(255,255,255,0.10); }
    .cv-lava:active { transform: scale(0.94); }
    .cv-lava img { width: 100%; height: 100%; object-fit: contain; transition: filter 240ms ease, opacity 240ms ease; }
    .cv-lava--off img { filter: grayscale(1) brightness(0.7); opacity: 0.7; }

    /* PDF icon-button — single round button matching the lava one, sits inline with EN/RU */
    .cv-pdf-iconbtn {
      width: 40px; height: 40px; border-radius: 999px;
      background: rgba(20, 20, 20, 0.78); border: 1px solid rgba(255,255,255,0.10);
      color: var(--fg-primary); cursor: pointer;
      display: grid; place-items: center;
      backdrop-filter: blur(8px);
      transition: background 160ms ease, transform 140ms ease;
      position: relative;
    }
    .cv-pdf-iconbtn:hover { background: rgba(40, 40, 40, 0.85); }
    .cv-pdf-iconbtn:active { transform: scale(0.94); }
    /* tooltip on hover */
    .cv-pdf-iconbtn::after {
      content: attr(data-tip);
      position: absolute; top: 110%; right: 0; white-space: nowrap;
      font: 500 11px/1 var(--font-sans); color: var(--fg-primary);
      background: rgba(20,20,20,0.92); border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 10px; border-radius: 8px; pointer-events: none;
      opacity: 0; transform: translateY(-2px); transition: opacity 160ms ease, transform 160ms ease;
    }
    .cv-pdf-iconbtn:hover::after { opacity: 1; transform: translateY(0); }

    /* PDF modal action buttons (used inside the viewer's top bar) */
    .cv-pdf-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font: 500 13px/1 var(--font-sans); color: #000;
      background: var(--fg-primary); border: 0; cursor: pointer;
      padding: 9px 14px; border-radius: 999px; text-decoration: none;
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
    }
    .cv-pdf-btn:hover { transform: translateY(-1px); }
    .cv-pdf-btn:active { transform: translateY(0) scale(0.98); }
    .cv-pdf-btn--ghost {
      background: rgba(255,255,255,0.10); color: var(--fg-primary);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .cv-pdf-btn--ghost:hover { background: rgba(255,255,255,0.16); }

    /* PDF modal */
    .cv-pdf-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      display: grid; place-items: center;
      animation: fadein 200ms ease both;
      padding: 24px;
    }
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
    .cv-pdf-modal__panel {
      width: min(100%, 920px); height: min(100%, 92vh);
      background: #1a1a1a; border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
    }
    .cv-pdf-modal__bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
    }
    .cv-pdf-modal__title { font: 500 13px/1 var(--font-sans); color: var(--fg-tertiary); letter-spacing: .04em; }
    .cv-pdf-modal__bar-actions { display: flex; gap: 8px; }
    .cv-pdf-modal__frame-wrap { flex: 1; background: #2a2a2a; }
    .cv-pdf-modal__frame { width: 100%; height: 100%; border: 0; background: #fff; }

    /* ============================================================== CV card */
    .cv-scroll {
      position: relative; z-index: 2;
      max-width: 920px; margin: 0 auto; padding: 96px 24px 96px;
      transition: opacity 360ms ease, transform 360ms ease, filter 360ms ease;
    }
    .cv-scroll.is-hidden,
    .cv-chrome.is-hidden { opacity: 0; transform: translateY(8px); filter: blur(6px); pointer-events: none; }
    .cv-card {
      background: rgba(20, 20, 20, 0.78);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 32px 36px;
    }

    /* ============================================================== Header */
    .cv-header { display: grid; grid-template-columns: 132px 1fr; gap: 24px; align-items: stretch; }
    .cv-header__avatar { width: 132px; height: 132px; border-radius: 16px; overflow: hidden; flex: 0 0 auto; background: #000; }
    .cv-header__avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cv-header__body { display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
    .cv-name { font-weight: 700; font-size: 36px; line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 6px; }
    .cv-title { font-size: 17px; color: var(--fg-secondary); font-weight: 500; opacity: 0.8; }
    .cv-header__socials { display: flex; flex-wrap: nowrap; gap: 10px; padding-top: 14px; align-items: center; }
    .cv-social {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--fg-primary); text-decoration: none;
      padding: 6px 10px; border-radius: 10px;
      transform-origin: center;
      transition: background 160ms ease;
      font-size: 14px;
    }
    .cv-social:hover { background: rgba(255,255,255,0.06); }
    .cv-social svg { width: 18px; height: 18px; flex: 0 0 auto; }
    /* Icon-only social links — square, just the glyph, tooltip on hover */
    .cv-social--icon { padding: 8px; }

    /* ============================================================== Sections */
    .cv-section { margin-top: 36px; }
    .cv-section__title {
      font-size: 12px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fg-tertiary); margin: 0 0 16px;
    }
    .cv-summary p { margin: 0 0 8px; font-size: 15px; line-height: 1.55; color: var(--fg-secondary); opacity: 0.85; }
    .cv-summary p:first-child { color: var(--fg-primary); font-size: 16px; opacity: 1; }
    .cv-stack > * + * { margin-top: 24px; }

    /* Skills */
    .cv-skills { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 16px; }
    .cv-skillgroup { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 14px; }
    .cv-skillgroup__name { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 8px; }
    .cv-tag-row { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Tags — original CV color logic
       (ports the bg/fg map from CV/src/components/Tag/Tag.tsx, "all" profile) */
    .cv-tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 6px;
      font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .cv-tag--default      { background: transparent; border: 1px solid var(--lenar-zinc-900); color: #fff; }
    .cv-tag--core         { background: var(--lenar-black); border: 1px solid var(--lenar-zinc-900); color: #fff; }
    .cv-tag--mobile       { background: #3B82F6; color: #fff; }
    .cv-tag--architecture { background: #F97316; color: #fff; }
    .cv-tag--principles   { background: #8B5CF6; color: #fff; }
    .cv-tag--process      { background: #3F3F46; color: #fff; }
    .cv-tag--react        { background: #61DBFB; color: #000; }
    .cv-tag--vue          { background: #10B981; color: #fff; }
    .cv-tag--backend      { background: #00ADD8; color: #fff; }
    .cv-tag--rendering    { background: #2563EB; color: #fff; }
    .cv-tag--tools        { background: #64748B; color: #fff; }
    .cv-tag--ux           { background: #FACC15; color: #000; }
    .cv-tag--uniform      { background: rgba(255,255,255,0.08); color: #fff; }

    /* Experience / Education */
    .cv-exp { padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); }
    .cv-exp__head { display: grid; grid-template-columns: 40px 1fr auto; gap: 12px; align-items: start; }
    .cv-exp__icon { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #fff; }
    .cv-exp__heading { min-width: 0; }
    .cv-exp__company { font-weight: 600; font-size: 16px; line-height: 1.2; }
    .cv-exp__title { color: var(--fg-secondary); font-size: 14px; margin-top: 2px; opacity: 0.75; }
    .cv-exp__meta { text-align: right; font-size: 12px; color: var(--fg-tertiary); }
    .cv-exp__loc { margin-top: 2px; }
    .cv-exp__bullets { margin: 12px 0 0; padding-left: 18px; }
    .cv-exp__bullets li { font-size: 14px; line-height: 1.55; color: var(--fg-secondary); margin-bottom: 4px; opacity: 0.85; }
    .cv-exp__bullets strong { color: var(--fg-primary); font-weight: 600; opacity: 1; }
    .cv-exp__tags { margin-top: 12px; }

    /* Generic bullet lists (awards, teaching) */
    .cv-bullet-list { margin: 0; padding-left: 18px; }
    .cv-bullet-list li { margin-bottom: 8px; font-size: 14px; line-height: 1.55; color: var(--fg-secondary); opacity: 0.85; }
    .cv-bullet-list strong { color: var(--fg-primary); font-weight: 600; opacity: 1; }
    .cv-bullet-sub { font-size: 12px; color: var(--fg-tertiary); margin-top: 2px; }

    @media (max-width: 720px) {
      .cv-chrome { top: 18px; right: 18px; }
      .cv-chrome .cv-pdf-iconbtn { width: 36px; height: 36px; }
      .cv-chrome .cv-lang__btn { padding: 6px 10px; font-size: 12px; }
      .cv-chrome .cv-profile__btn { padding: 6px 10px; font-size: 12px; }
      .cv-header { grid-template-columns: 1fr; }
      .cv-header__avatar { width: 96px; height: 96px; }
      .cv-name { font-size: 28px; }
      .cv-skills { grid-template-columns: 1fr; }
      .cv-exp__head { grid-template-columns: 36px 1fr; }
      .cv-exp__meta { grid-column: 2; text-align: left; margin-top: 4px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js?v=6"></script>
  <script type="text/babel" src="NoiseBackground.jsx?v=35"></script>
  <script type="text/babel" src="SocialIcon.jsx?v=6"></script>
  <script type="text/babel" src="Tag.jsx?v=6"></script>
  <script type="text/babel" src="Header.jsx?v=9"></script>
  <script type="text/babel" src="Sections.jsx?v=6"></script>
  <script type="text/babel" src="Controls.jsx?v=7"></script>

  <script type="text/babel">
    const { useState } = React;
    function CVApp() {
      const [lang, setLang] = useState('en');
      const [lava, setLava] = useState(false);
      const [pdfOpen, setPdfOpen] = useState(false);
      // Read profile from URL (?profile=react|vue|fullstack), default to 'all'.
      // ProfileSwitcher navigates by setting this query param so each profile
      // is a real bookmarkable URL — same model as the Astro routes in CV/.
      const profile = (() => {
        const p = new URLSearchParams(window.location.search).get('profile');
        return ['react', 'vue', 'fullstack'].includes(p) ? p : 'all';
      })();
      const data = window.cvData;
      const t = data.i18n[lang];
      const pdfUrl = "resume.html";

      React.useEffect(() => {
        document.body.classList.toggle('lava-mode', lava);
      }, [lava]);

      // Lava-mode hides both the CV card AND the floating chrome cluster (lang/PDF),
      // so the noise field is unobstructed. The lava toggle itself stays visible.
      const hidden = lava;
      return (
        <div className="cv-stage">
          <NoiseBackground />
          <LavaToggle on={lava} onClick={() => setLava(v => !v)} t={t} />
          <div className={"cv-chrome" + (hidden ? " is-hidden" : "")}>
            <div className="cv-chrome__row">
              <PDFIconButton t={t} onView={() => setPdfOpen(true)} />
              <LangSwitcher lang={lang} onChange={setLang} />
            </div>
          </div>
          <main className={"cv-scroll" + (hidden ? " is-hidden" : "")}>
            <article className="cv-card">
              <Header data={data} lang={lang} profile={profile} />
              <Summary data={data} lang={lang} t={t} />
              <KeySkills data={data} lang={lang} t={t} />
              <Experience data={data} lang={lang} t={t} />
              <Education data={data} lang={lang} t={t} />
              <Awards data={data} lang={lang} t={t} />
              <Teaching data={data} lang={lang} t={t} />
            </article>
          </main>
          <PDFViewer open={pdfOpen} onClose={() => setPdfOpen(false)} pdfUrl={pdfUrl} t={t} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<CVApp />);
  </script>
</body>
</html>
