<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#222;}
  .card{padding:24px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
  .demo{padding:14px;width:180px;border-radius:8px;}
  .a{background:rgba(10,10,10,0.9);backdrop-filter:blur(4px);}
  .b{background:rgba(10,10,10,0.8);backdrop-filter:blur(4px);}
  .c{background:rgba(34,34,34,0.8);backdrop-filter:blur(4px);}
  .d{background:#fff;color:#000;box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);}
  .lbl{font-family:var(--font-mono);font-size:11px;color:#718096;letter-spacing:.04em;}
  .v{font-family:var(--font-mono);font-size:12px;color:#FACC15;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="demo a"><div class="lbl">primary‑bg/90</div><div class="v">backdrop‑blur‑sm</div></div>
    <div class="demo b"><div class="lbl">primary‑bg/80</div><div class="v">skill cards</div></div>
    <div class="demo c"><div class="lbl">secondary/80</div><div class="v">header right</div></div>
    <div class="demo d"><div class="lbl" style="color:#222">shadow‑md</div><div class="v" style="color:#222">CV outer card</div></div>
  </div>
</div></body></html>
