<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:24px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:118px;border-radius:8px;overflow:hidden;}
  .sw .chip{height:64px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;letter-spacing:.01em;}
  .sw .meta{padding:6px 8px;font-size:10.5px;color:#fff;background:#141414;}
  .sw .hex{font-family:var(--font-mono);color:#718096;font-size:10px;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#61DBFB;color:#000">React</div><div class="meta">React eco<br><span class="hex">#61DBFB</span></div></div>
    <div class="sw"><div class="chip" style="background:#10B981">Vue</div><div class="meta">Vue eco<br><span class="hex">#10B981</span></div></div>
    <div class="sw"><div class="chip" style="background:#00ADD8">Go</div><div class="meta">Backend<br><span class="hex">#00ADD8</span></div></div>
    <div class="sw"><div class="chip" style="background:#F97316">Arch</div><div class="meta">Architecture<br><span class="hex">#F97316</span></div></div>
    <div class="sw"><div class="chip" style="background:#8B5CF6">SOLID</div><div class="meta">Principles<br><span class="hex">#8B5CF6</span></div></div>
    <div class="sw"><div class="chip" style="background:#3F3F46">Agile</div><div class="meta">Process<br><span class="hex">#3F3F46</span></div></div>
    <div class="sw"><div class="chip" style="background:#3B82F6">Mobile</div><div class="meta">Mobile<br><span class="hex">#3B82F6</span></div></div>
    <div class="sw"><div class="chip" style="background:#2563EB">SSR</div><div class="meta">Rendering<br><span class="hex">#2563EB</span></div></div>
    <div class="sw"><div class="chip" style="background:#FACC15;color:#000">UX</div><div class="meta">UX & Visual<br><span class="hex">#FACC15</span></div></div>
    <div class="sw"><div class="chip" style="background:#64748B">Tools</div><div class="meta">Tools<br><span class="hex">#64748B</span></div></div>
  </div>
</div></body></html>
