<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:24px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .swatch{width:140px;border-radius:8px;overflow:hidden;border:1px solid #18181b;}
  .swatch .chip{height:72px;}
  .swatch .meta{padding:8px 10px;font-size:11px;background:#0A0A0A;color:#fff;}
  .swatch .name{font-weight:600;}
  .swatch .hex{color:#718096;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.02em;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#0A0A0A;border-bottom:1px solid #222"></div><div class="meta"><div class="name">primary‑bg</div><div class="hex">#0A0A0A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#222222"></div><div class="meta"><div class="name">secondary</div><div class="hex">#222222</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">text‑primary</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#718096"></div><div class="meta"><div class="name">text‑tertiary</div><div class="hex">#718096</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F3F4F6"></div><div class="meta"><div class="name">page‑bg (gray‑100)</div><div class="hex">#F3F4F6</div></div></div>
  </div>
</div></body></html>
