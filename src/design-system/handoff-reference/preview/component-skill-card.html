<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#222;}
  .wrap{padding:28px;color:#fff;font-family:var(--font-sans);}
  .card{background:rgba(10,10,10,0.8);backdrop-filter:blur(4px);border-radius:12px;padding:16px;display:inline-block;min-width:240px;}
  .ttl{font-size:18px;font-weight:600;line-height:1;margin-bottom:12px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .tag{padding:4px 8px;font-size:12px;border-radius:6px;}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="ttl">React</div>
    <div class="row">
      <span class="tag" style="background:#61DBFB;color:#000">React</span>
      <span class="tag" style="background:#61DBFB;color:#000">Next.js</span>
      <span class="tag" style="background:#61DBFB;color:#000">Redux</span>
      <span class="tag" style="background:#61DBFB;color:#000">Zustand</span>
      <span class="tag" style="background:#61DBFB;color:#000">shadcn/ui</span>
    </div>
  </div>
</div></body></html>
