<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:24px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;}
  .item{text-align:center;}
  .item img{width:72px;height:72px;border-radius:12px;background:#fff;object-fit:cover;}
  .nm{font-size:11.5px;color:#718096;font-family:var(--font-mono);margin-top:8px;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="item"><img src="../assets/icons/cobalt.png"><div class="nm">cobalt</div></div>
    <div class="item"><img src="../assets/icons/portal.jpg"><div class="nm">portal</div></div>
    <div class="item"><img src="../assets/icons/smartua.svg"><div class="nm">smartua</div></div>
    <div class="item"><img src="../assets/icons/icons8.svg"><div class="nm">icons8</div></div>
    <div class="item"><img src="../assets/icons/mkskom.svg"><div class="nm">mkskom</div></div>
    <div class="item"><img src="../assets/icons/iu.jpg"><div class="nm">iu</div></div>
    <div class="item"><img src="../assets/icons/freelance_white.png" style="background:#0A0A0A"><div class="nm">freelance</div></div>
  </div>
</div></body></html>
