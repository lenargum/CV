<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:28px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .tag{padding:4px 8px;font-size:12px;border-radius:6px;line-height:1.2;}
  .tag-core{background:#0A0A0A;color:#fff;border:1px solid #18181B;}
  .label{color:#718096;font-size:11px;font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase;margin:0 0 8px;}
  .row + .label{margin-top:18px;}
</style></head>
<body><div class="card">
  <div class="label">Tag · all profile (categorical)</div>
  <div class="row">
    <span class="tag" style="background:#61DBFB;color:#000">React</span>
    <span class="tag" style="background:#61DBFB;color:#000">Next.js</span>
    <span class="tag" style="background:#10B981;color:#fff">Vue</span>
    <span class="tag" style="background:#10B981;color:#fff">Nuxt</span>
    <span class="tag" style="background:#00ADD8;color:#fff">Go</span>
    <span class="tag" style="background:#F97316;color:#fff">Design Systems</span>
    <span class="tag" style="background:#8B5CF6;color:#fff">SOLID</span>
    <span class="tag" style="background:#3F3F46;color:#fff">Agile</span>
    <span class="tag" style="background:#3B82F6;color:#fff">Flutter</span>
    <span class="tag" style="background:#FACC15;color:#000">UI/UX</span>
    <span class="tag" style="background:#64748B;color:#fff">Vite</span>
    <span class="tag tag-core">TypeScript</span>
  </div>
  <div class="label">Tag · single‑profile (uniform charcoal)</div>
  <div class="row">
    <span class="tag" style="background:#222;color:#fff">React</span>
    <span class="tag" style="background:#222;color:#fff">TypeScript</span>
    <span class="tag" style="background:#222;color:#fff">Next.js</span>
    <span class="tag" style="background:#222;color:#fff">Tailwind</span>
    <span class="tag" style="background:#222;color:#fff">Motion.js</span>
  </div>
</div></body></html>
