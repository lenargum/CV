<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:18px;color:#fff;font-family:var(--font-sans);display:flex;gap:20px;align-items:center;}
  .av{width:120px;height:120px;background:#0A0A0A;border-radius:8px;overflow:hidden;}
  .av img{width:100%;height:100%;object-fit:cover;object-position:top;}
  .lava{width:64px;height:64px;border-radius:9999px;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .lava img{width:75%;height:75%;object-fit:cover;}
  .lbl{font-size:11.5px;color:#718096;font-family:var(--font-mono);margin-top:6px;text-align:center;}
</style></head>
<body><div class="card">
  <div><div class="av"><img src="../assets/resume_photo.png"></div><div class="lbl">resume_photo · b&w</div></div>
  <div><div class="av"><img src="../assets/avatar-1024.png"></div><div class="lbl">avatar‑1024 · OG</div></div>
  <div><div class="lava"><img src="../assets/lava-lamp.png"></div><div class="lbl">lava toggle</div></div>
</div></body></html>
