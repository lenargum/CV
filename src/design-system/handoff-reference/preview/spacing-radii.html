<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  .card{padding:24px;color:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
  .demo{background:#222;border-radius:8px;padding:14px;width:200px;}
  .lbl{color:#718096;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;margin-top:8px;}
  .v{font-family:var(--font-mono);font-size:12.5px;color:#FACC15;}
  .chip{display:inline-block;height:14px;background:#fff;border-radius:6px;}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="demo">
      <div style="width:48px;height:48px;background:#fff;border-radius:6px;"></div>
      <div class="lbl">md · tag</div><div class="v">6px</div>
    </div>
    <div class="demo">
      <div style="width:48px;height:48px;background:#fff;border-radius:8px;"></div>
      <div class="lbl">lg · button</div><div class="v">8px</div>
    </div>
    <div class="demo">
      <div style="width:48px;height:48px;background:#fff;border-radius:12px;"></div>
      <div class="lbl">xl · card / logo</div><div class="v">12px</div>
    </div>
    <div class="demo">
      <div style="width:48px;height:48px;background:#fff;border-radius:9999px;"></div>
      <div class="lbl">full · lava btn</div><div class="v">9999px</div>
    </div>
  </div>
</div></body></html>
